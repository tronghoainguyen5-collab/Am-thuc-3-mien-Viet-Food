<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý người dùng - VietStove Admin</title>
    <link rel="stylesheet" href="public/css/admin.css">
    <style>
        /* admin.css - User Management Edition */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

:root {
    --primary: #ff6d1b;
    --primary-glow: rgba(255, 109, 27, 0.3);
    --bg-black: #080808;
    --surface: rgba(20, 20, 22, 0.8);
    --border: rgba(255, 255, 255, 0.08);
    --text-main: #ffffff;
    --text-muted: #a1a1aa;
    --ease: cubic-bezier(0.2, 0, 0, 1);
}

body { 
    background-color: var(--bg-black);
    background-image: 
        radial-gradient(at 0% 0%, rgba(255, 109, 27, 0.08) 0px, transparent 40%),
        radial-gradient(at 100% 100%, rgba(255, 109, 27, 0.03) 0px, transparent 40%);
    color: var(--text-main); 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    margin: 0;
    min-height: 100vh;
}

/* --- MODAL TRONG SUỐT CAO CẤP --- */
.modal {
    display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.8); 
    backdrop-filter: blur(20px); 
    align-items: center; justify-content: center;
}

.modal-content {
    width: 420px; padding: 40px; border-radius: 32px; 
    background: #111; 
    border: 1px solid var(--border); 
    box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
    animation: modalSlideUp 0.5s var(--ease);
}

@keyframes modalSlideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* --- INPUT & SELECT BOX --- */
.input-group { margin-bottom: 22px; }
.input-group label { 
    display: block; margin-bottom: 10px; color: var(--text-muted); 
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
}

.input-group input, .input-group select {
    width: 100%; padding: 14px 18px; 
    background: rgba(255, 255, 255, 0.03); 
    border: 1px solid var(--border); 
    border-radius: 16px; color: white; outline: none; 
    transition: 0.3s var(--ease);
    font-size: 15px;
}

.input-group input:focus, .input-group select:focus { 
    border-color: var(--primary); 
    background: rgba(255, 109, 27, 0.03);
    box-shadow: 0 0 0 4px var(--primary-glow); 
}

/* --- BẢNG NGƯỜI DÙNG (GLASS PANEL) --- */
.glass-panel {
    background: var(--surface); 
    border-radius: 32px; padding: 30px; 
    border: 1px solid var(--border);
    backdrop-filter: blur(20px);
}

table th {
    padding: 20px 15px; color: var(--primary); 
    font-size: 12px; font-weight: 800; 
    text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
}

table td {
    padding: 20px 15px; color: #eee;
    border-bottom: 1px solid rgba(255, 255, 255, 0.02);
}

tr:hover td {
    background: rgba(255, 109, 27, 0.02);
}

/* --- NÚT BẤM --- */
.btn-save { 
    background: var(--primary); color: white; border: none; 
    padding: 14px 28px; border-radius: 14px; font-weight: 800; 
    cursor: pointer; transition: 0.3s;
    box-shadow: 0 8px 20px var(--primary-glow);
}

.btn-save:hover { 
    transform: translateY(-2px); 
    box-shadow: 0 12px 25px var(--primary-glow);
    filter: brightness(1.1);
}

.btn-cancel { 
    background: transparent; color: var(--text-muted); border: 1px solid var(--border); 
    padding: 14px 25px; border-radius: 14px; cursor: pointer; font-weight: 600;
}

.btn-cancel:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }

/* --- ROLE BADGE (Dùng cho cột Vai trò) --- */
.role-badge {
    padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 800;
    text-transform: uppercase;
}
.role-admin { background: rgba(255, 109, 27, 0.15); color: var(--primary); border: 1px solid var(--primary-glow); }
.role-user { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid var(--border); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo" style="padding: 30px 20px; text-align: center;">
            <h2 style="color: #4facfe; letter-spacing: 2px; margin: 0;">VIETSTOVE</h2>
        </div>
        <nav>
            <a href="admin.html" class="active">📊 Thống kê</a>
            <a href="admin-users.html">👥 Người dùng</a>
            <a href="admin-recipes.html">🍲 Công thức</a>
        </nav>
    </aside>

    <main class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <div>
                <h1 style="font-size: 24px;">Quản lý người dùng</h1>
                <p style="color: #94a3b8; font-size: 14px;">Danh sách thành viên quản trị và người dùng</p>
            </div>
            
            <div style="display: flex; align-items: center; gap: 20px;">
                <!-- <div class="admin-profile-header">
                    <img src="https://via.placeholder.com/35" alt="Avatar">
                    <span>Admin</span>
                </div> -->
                <button class="btn btn-primary" onclick="openUserModal()" style="padding: 12px 20px; border-radius: 12px; background: #4facfe; border: none; color: white; font-weight: 600; cursor: pointer;">
                    + Thêm User
                </button>
            </div>
        </header>

        <div class="glass-panel" style="background: rgba(30, 41, 59, 0.7); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05);">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <th style="padding: 15px;">ID</th>
                        <th style="padding: 15px;">Hội viên</th>
                        <th style="padding: 15px;">Email</th>
                        <th style="padding: 15px;">Vai trò</th>
                        <th style="padding: 15px; text-align: center;">Hành động</th>
                    </tr>
                </thead>
                <tbody id="userList">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="userModal" class="modal">
        <div class="modal-content">
            <h2 id="userModalTitle" style="margin-bottom: 25px; color: #4facfe; font-size: 20px;">Thêm người dùng</h2>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="input-group">
                    <label>Họ tên</label>
                    <input type="text" id="userName" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="userEmail" required>
                </div>
                <div class="input-group">
                    <label>Vai trò</label>
                    <select id="userRole">
                        <option value="Admin">Admin</option>
                        <option value="Hội viên">Hội viên</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeUserModal()">Hủy</button>
                    <button type="submit" class="btn-save">Lưu lại</button>
                </div>
            </form>
        </div>
    </div>

    <script src="public/js/data.js"></script> 
    <script src="public/js/admin-users.js"></script>
</body>
</html>
