<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý công thức - VietStove Admin</title>
    <link rel="stylesheet" href="public/css/admin.css">
    <style>
        /* admin.css - Cập nhật cho trang Quản lý Công thức */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

:root {
    --primary: #ff6d1b;
    --primary-glow: rgba(255, 109, 27, 0.3);
    --bg-black: #080808;
    --surface: rgba(20, 20, 22, 0.8);
    --border: rgba(255, 255, 255, 0.08);
    --text-main: #ffffff;
    --text-muted: #a1a1aa;
    --ease: cubic-bezier(0.2, 0, 0, 1);
}

body { 
    background-color: var(--bg-black);
    background-image: 
        radial-gradient(at 0% 0%, rgba(255, 109, 27, 0.08) 0px, transparent 40%),
        radial-gradient(at 100% 100%, rgba(255, 109, 27, 0.03) 0px, transparent 40%);
    color: var(--text-main); 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    margin: 0;
    min-height: 100vh;
}

/* --- MODAL STYLE --- */
.modal {
    display: none; 
    position: fixed; 
    z-index: 1000;
    left: 0; top: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.8); 
    backdrop-filter: blur(15px);
    align-items: center; 
    justify-content: center;
    transition: var(--ease) 0.4s;
}

.modal-content {
    width: 90%;
    max-width: 500px; 
    padding: 40px; 
    border-radius: 32px;
    background: #121212; 
    border: 1px solid var(--border);
    box-shadow: 0 25px 80px rgba(0, 0, 0, 0.9), 0 0 20px rgba(255, 109, 27, 0.05);
    transform: translateY(20px);
    animation: modalShow 0.4s var(--ease) forwards;
}

@keyframes modalShow {
    to { transform: translateY(0); opacity: 1; }
}

/* --- INPUTS --- */
.input-group { margin-bottom: 20px; }
.input-group label { 
    display: block; 
    margin-bottom: 10px; 
    color: var(--text-muted); 
    font-size: 13px; 
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.input-group input, .input-group select {
    width: 100%; 
    padding: 14px 18px; 
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border); 
    border-radius: 16px; 
    color: white;
    font-size: 15px;
    outline: none; 
    transition: 0.3s var(--ease);
}

.input-group input:focus, .input-group select:focus { 
    border-color: var(--primary); 
    background: rgba(255, 109, 27, 0.02);
    box-shadow: 0 0 0 4px var(--primary-glow); 
}

/* --- IMAGE PREVIEW --- */
#imagePreviewContainer {
    margin-top: 15px; 
    text-align: center; 
    padding: 15px; 
    border: 2px dashed var(--border); 
    border-radius: 20px;
    background: rgba(0,0,0,0.3);
}

#imagePreview {
    max-width: 100%; 
    max-height: 180px; 
    border-radius: 12px; 
    object-fit: cover;
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}

/* --- BUTTONS --- */
.btn-save { 
    background: var(--primary); 
    color: white; 
    border: none; 
    padding: 14px 30px; 
    border-radius: 14px; 
    font-weight: 700; 
    cursor: pointer; 
    transition: 0.3s;
    box-shadow: 0 8px 20px var(--primary-glow);
}

.btn-save:hover { 
    transform: translateY(-2px);
    filter: brightness(1.1);
    box-shadow: 0 12px 25px var(--primary-glow);
}

.btn-cancel { 
    background: transparent; 
    color: var(--text-muted); 
    border: 1px solid var(--border); 
    padding: 14px 25px; 
    border-radius: 14px; 
    cursor: pointer; 
    font-weight: 600;
}

.btn-cancel:hover { 
    background: rgba(255, 255, 255, 0.05); 
    color: white; 
}

/* --- TABLE CUSTOMIZATION --- */
.glass-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 32px;
    padding: 30px;
    backdrop-filter: blur(20px);
}

table th {
    color: var(--primary) !important; /* Màu cam cho tiêu đề bảng */
    font-weight: 700;
}

#recipeList tr td {
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
}

#recipeList tr:hover td {
    background: rgba(255, 109, 27, 0.02);
}

/* --- UI TRANG TRÍ --- */
.loading {
    color: var(--primary);
    font-weight: 600;
    letter-spacing: 1px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
}
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo" style="padding: 30px 20px; text-align: center;">
            <h2 style="color: #4facfe; letter-spacing: 2px; margin: 0;">VIETSTOVE</h2>
        </div>
        <nav>
    <a href="admin.html" class="active">📊 Thống kê</a>
    <a href="admin-users.html">👥 Người dùng</a>
    <a href="admin-recipes.html">🍲 Công thức</a>
    <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border);">
        <a href="index.html" style="background: rgba(255, 109, 27, 0.1); color: var(--primary); font-weight: 700;">🏠 Về trang chủ</a>
    </div>
</nav>
    </aside>

    <main class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px;">
            <div>
                <h1 style="font-size: 24px; margin: 0 0 5px 0;">Quản lý công thức nấu ăn</h1>
                <p style="color: #94a3b8; font-size: 14px; margin: 0;">Danh sách tất cả món ăn trên hệ thống VietStove</p>
            </div>
            
            <div style="display: flex; align-items: center; gap: 20px;">
                <!-- <div class="admin-profile-header">
                    <img id="adminAvatar" src="https://via.placeholder.com/35" alt="Avatar">
                    <span id="adminName">Bach Cong Tuan Anh</span>
                </div> -->
                <button class="btn btn-primary" onclick="openModal()" style="padding: 12px 24px; border-radius: 12px; background: #4facfe; border: none; color: white; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);">
                    + Thêm món mới
                </button>
            </div>
        </header>

        <div class="glass-panel" style="background: rgba(30, 41, 59, 0.7); border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr style="text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); color: #94a3b8; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">
                            <th style="padding: 15px;">Ảnh</th>
                            <th style="padding: 15px;">Tên món ăn</th>
                            <th style="padding: 15px;">Vùng miền</th>
                            <th style="padding: 15px;">Lượt xem</th>
                            <th style="padding: 15px; text-align: center;">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="recipeList">
                        <tr>
                            <td colspan="5" style="text-align:center; padding: 80px;">
                                <div class="loading" style="color: #94a3b8; font-style: italic;">Đang tải dữ liệu từ VietStove...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="recipeModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin: 0 0 25px 0; color: #4facfe; font-size: 22px;">Thêm công thức mới</h2>
            <form id="recipeForm">
                <input type="hidden" id="recipeId">
                
                <div class="input-group">
                    <label for="recipeName">Tên món ăn</label>
                    <input type="text" id="recipeName" required placeholder="Ví dụ: Phở Bò Hà Nội">
                </div>

                <div class="input-group">
                    <label for="recipeRegion">Vùng miền (Danh mục)</label>
                    <select id="recipeRegion" required>
                        </select>
                </div>

                <div class="input-group">
                    <label for="recipeImage">Hình ảnh công thức</label>
                    <input type="file" id="recipeImage" accept="image/*" style="padding: 8px; cursor: pointer;">
                    
                    <div id="imagePreviewContainer" style="display: none;">
                        <img id="imagePreview" src="" alt="Preview">
                        <p style="font-size: 11px; color: #94a3b8; margin-top: 5px;">Xem trước hình ảnh</p>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Đóng</button>
                    <button type="submit" class="btn-save">Lưu thay đổi</button>
                </div>
            </form>
        </div>
    </div>

    <script src="public/js/data.js"></script> 
    <script src="public/js/admin.js"></script>
    
    <script>
        // Đóng modal khi click ra ngoài vùng chứa
        window.onclick = function(event) {
            const modal = document.getElementById("recipeModal");
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
