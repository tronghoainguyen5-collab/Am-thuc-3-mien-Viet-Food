<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - VietFood</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <form class="auth-form">
            <h2>Chào Mừng Trở Lại</h2>
            <p>Vui lòng đăng nhập để lưu công thức yêu thích</p>
            
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="example@gmail.com" required>
            </div>
            
            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" placeholder="********" required>
            </div>
            
            <button type="submit" class="btn-submit">Đăng Nhập</button>
            <p class="switch-auth">Chưa có tài khoản? <a href="dang-ky.html">Đăng ký ngay</a></p>
            <a href="index.html" class="back-home">← Quay về trang chủ</a>
        </form>
    </div>
</body>
</html>
