<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống kê - VietStove Admin</title>
    <link rel="stylesheet" href="public/css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
       /* admin.css - Dashboard Statistics Edition */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

:root {
    --primary: #ff6d1b;
    --primary-glow: rgba(255, 109, 27, 0.3);
    --bg-black: #080808;
    --surface: rgba(20, 20, 22, 0.8);
    --border: rgba(255, 255, 255, 0.08);
    --text-main: #ffffff;
    --text-muted: #a1a1aa;
}

body { 
    background-color: var(--bg-black);
    background-image: 
        radial-gradient(at 0% 0%, rgba(255, 109, 27, 0.1) 0px, transparent 40%),
        radial-gradient(at 100% 100%, rgba(255, 109, 27, 0.05) 0px, transparent 40%);
    color: var(--text-main); 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    margin: 0;
}

/* --- STATS GRID: Bento Box Style --- */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
    background: var(--surface);
    backdrop-filter: blur(20px);
    padding: 30px;
    border-radius: 28px;
    border: 1px solid var(--border);
    text-align: left; /* Đổi sang canh trái nhìn hiện đại hơn */
    transition: all 0.4s cubic-bezier(0.2, 0, 0, 1);
    position: relative;
    overflow: hidden;
}

.stat-card:hover {
    transform: translateY(-5px);
    border-color: rgba(255, 109, 27, 0.4);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 15px var(--primary-glow);
}

.stat-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 60px; height: 60px;
    background: radial-gradient(circle at top right, var(--primary-glow), transparent 70%);
}

.stat-value { 
    font-size: 40px; 
    font-weight: 800; 
    color: #fff; 
    margin: 10px 0; 
    letter-spacing: -1px;
    background: linear-gradient(180deg, #fff 0%, var(--primary) 150%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.stat-label { 
    color: var(--text-muted); 
    font-size: 12px; 
    text-transform: uppercase; 
    font-weight: 700;
    letter-spacing: 1.5px;
}

/* --- CHARTS CONTAINER --- */
.charts-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
}

.chart-box {
    background: var(--surface);
    backdrop-filter: blur(20px);
    padding: 30px;
    border-radius: 32px;
    border: 1px solid var(--border);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

.chart-box h3 {
    margin-top: 0;
    margin-bottom: 25px;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
}

.chart-box h3::before {
    content: '';
    width: 4px; height: 16px;
    background: var(--primary);
    border-radius: 10px;
}

@media (max-width: 992px) { 
    .charts-container { grid-template-columns: 1fr; } 
    .main-content { padding: 20px; }
}

/* Tùy chỉnh thanh cuộn cho chuyên nghiệp */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo" style="padding: 30px 20px; text-align: center;">
            <!-- <img src="public/image/lg.png" alt="" style="border-radius: 100px;
                                                        "> -->
            <h2 style="color: #4facfe; letter-spacing: 2px; margin: 0;">VIETSTOVE</h2>
        </div>
        <nav>
    <a href="admin.html" class="active">📊 Thống kê</a>
    <a href="admin-users.html">👥 Người dùng</a>
    <a href="admin-recipes.html">🍲 Công thức</a>
    <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border);">
        <a href="index.html" style="background: rgba(255, 109, 27, 0.1); color: var(--primary); font-weight: 700;">🏠 Về trang chủ</a>
    </div>
</nav>
    </aside>

    <main class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <div>
                <h1 style="font-size: 24px; margin: 0;">Bảng điều khiển hệ thống</h1>
                <p style="color: #94a3b8; font-size: 14px;">Tổng quan dữ liệu VietStove thời gian thực</p>
            </div>
            <div class="admin-profile-header" style="display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 50px;">
                <!-- <img id="adminAvatar" src="" style="width: 35px; height: 35px; border-radius: 50%; border: 2px solid #4facfe;"> -->
                <!-- <span id="adminName" style="font-size: 14px;">Admin</span> -->
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Tổng món ăn</div>
                <div id="totalRecipes" class="stat-value">0</div>
            </div>
            <div class="stat-card">

            </div>
            <div class="stat-card">

        </div>

        <div class="charts-container">
            <div class="chart-box">
                <h3 style="margin-top: 0; margin-bottom: 20px; font-size: 16px; color: #e2e8f0;">Tỉ lệ món ăn theo vùng miền</h3>
                <canvas id="regionChart"></canvas>
            </div>
            <div class="chart-box">
                <h3 style="margin-top: 0; margin-bottom: 20px; font-size: 16px; color: #e2e8f0;">Top 5 món ăn xem nhiều nhất</h3>
                <canvas id="topRecipesChart"></canvas>
            </div>
        </div>
    </main>

    <script src="public/js/data.js"></script>
    <script src="public/js/admin-stats.js"></script>
</body>
</html>
