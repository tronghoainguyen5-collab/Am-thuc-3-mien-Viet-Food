<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản - Bếp Việt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <form class="auth-form">
            <h2>Tạo Tài Khoản</h2>
            <p>Tham gia cộng đồng yêu ẩm thực Việt</p>
            
            <div class="input-group">
                <label>Họ và Tên</label>
                <input type="text" placeholder="Nguyễn Văn A" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="example@gmail.com" required>
            </div>
            
            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" placeholder="Ít nhất 6 ký tự" required>
            </div>
            
            <button type="submit" class="btn-submit">Đăng Ký</button>
            <p class="switch-auth">Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập</a></p>
            <a href="index.html" class="back-home">← Quay về trang chủ</a>
        </form>
    </div>
</body>
</html>
